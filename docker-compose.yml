version: "3.9"

services:
  postgres:
    image: postgres:14
    container_name: car_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: car_project
    volumes:
      - pgdata:/var/lib/postgresql/data

  fastapi:
    build: .
    container_name: car_api
    restart: always
    depends_on:
      - postgres
    ports:
      - "8001:8000"

volumes:
  pgdata:
